<!DOCTYPE html>
<html lang="pt-BR" class="h-full overflow-hidden">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ZenFocus</title>

  <!-- SEO & PWA Meta Tags -->
  <meta name="description"
    content="ZenFocus: Um painel de hábitos e cronômetro Pomodoro minimalista e ultra rápido para aumentar seu foco diário.">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ZenFocus">

  <!-- Fontes Premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Folha de estilo principal -->
  <link rel="stylesheet" href="style.css">

  <!-- start webpushr tracking code -->
  <script>(function (w, d, s, id) {
      if (typeof (w.webpushr) !== 'undefined') return; w.webpushr = w.webpushr || function () { (w.webpushr.q = w.webpushr.q || []).push(arguments) }; var js, fjs = d.getElementsByTagName(s)[0]; js = d.createElement(s); js.id = id; js.async = 1; js.src = "https://cdn.webpushr.com/app.min.js";
      fjs.parentNode.appendChild(js);
    }(window, document, 'script', 'webpushr-jssdk'));
    webpushr('setup', { 
      'key': 'BG1vN68XFauRRZiiU_JQfk2WDMhfOvUDN45K-gKcns0woi2egQIDQUuGzWdj0CSbF279RfNjkdVK9dGDefVltqA',
      'sw': 'none'
    });
  </script>
  <!-- end webpushr tracking code -->

</head>

<body class="h-[100dvh] w-screen flex flex-col overflow-hidden bg-slate-950 text-slate-100 font-sans">
  <!-- Sombra de fundo radial decorativa (Neon ambient glow) -->
  <div
    class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-96 bg-violet-600/10 blur-[120px] rounded-full pointer-events-none z-0">
  </div>

  <!-- Cabeçalho (Header) -->
  <header
    class="relative z-10 flex items-center justify-between px-6 pb-4 md:px-8 border-b border-white/5 bg-slate-950/40 backdrop-blur-md safe-padding-top">
    <div class="flex items-center space-x-3">
      <div
        class="w-10 h-10 rounded-xl bg-gradient-to-tr from-violet-600 to-fuchsia-600 flex items-center justify-center shadow-lg shadow-violet-500/20">
        <!-- SVG Logo: Lotus/Focus shape -->
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
      </div>
      <div>
        <h1
          class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent">
          ZenFocus</h1>
        <p class="text-xs text-violet-400/80 font-medium tracking-wide uppercase">Produtividade Pura</p>
      </div>
    </div>

    <!-- Botão de Instalação PWA (Escondido por padrão, aparece via JS) -->
    <button id="pwa-install-btn"
      class="hidden relative overflow-hidden group px-4 py-2 rounded-xl text-xs font-semibold text-white bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 focus:outline-none focus:ring-2 focus:ring-violet-500/50 shadow-md hover:shadow-lg active:scale-95 transition-all duration-200">
      <span class="relative z-10 flex items-center space-x-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        <span>Instalar App</span>
      </span>
      <div
        class="absolute inset-0 w-full h-full bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
      </div>
    </button>
  </header>

  <!-- Área de Conteúdo Principal -->
  <main class="relative z-10 flex-1 overflow-hidden w-full max-w-xl mx-auto flex flex-col">
    <!-- Contêiner de Abas Deslizante -->
    <div id="tab-wrapper"
      class="flex w-[200%] h-full transition-transform duration-300 ease-out transform translate-x-0">

      <!-- ABA 1: CRONÔMETRO POMODORO (Ativa por padrão) -->
      <section id="pomodoro-view"
        class="w-1/2 flex-shrink-0 flex flex-col items-center justify-center space-y-6 px-6 py-4">

        <!-- Seletor de Modo (Foco / Descanso Curto / Descanso Longo) -->
        <div class="flex p-1.5 rounded-2xl bg-white/[0.03] border border-white/5 w-full max-w-sm">
          <button id="mode-focus"
            class="flex-1 py-2 px-3 rounded-xl text-xs font-semibold tracking-wide transition-all duration-300 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white shadow-md">
            Foco
          </button>
          <button id="mode-short"
            class="flex-1 py-2 px-3 rounded-xl text-xs font-semibold tracking-wide text-slate-400 hover:text-slate-200 transition-all duration-300">
            Curto
          </button>
          <button id="mode-long"
            class="flex-1 py-2 px-3 rounded-xl text-xs font-semibold tracking-wide text-slate-400 hover:text-slate-200 transition-all duration-300">
            Longo
          </button>
        </div>

        <!-- Display Circular do Timer -->
        <div class="relative w-72 h-72 md:w-80 md:h-80 flex items-center justify-center animate-float">
          <!-- SVG Círculo de Progresso -->
          <svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 100 100">
            <!-- Círculo de Fundo -->
            <circle cx="55" cy="55" r="44" class="stroke-white/[0.02]" stroke-width="3" fill="none"
              transform="translate(-5, -5)" />
            <!-- Círculo de Progresso Ativo -->
            <circle id="timer-progress" cx="55" cy="55" r="44" class="timer-circle stroke-violet-500" stroke-width="3.5"
              stroke-dasharray="276.46" stroke-dashoffset="0" stroke-linecap="round" fill="none"
              transform="translate(-5, -5)" />
          </svg>

          <!-- Texto do Cronômetro -->
          <div class="relative flex flex-col items-center text-center">
            <div id="timer-display" class="text-6xl md:text-7xl font-light tracking-tight tabular-nums font-sans">25:00
            </div>
            <div id="timer-status-text" class="text-xs font-bold tracking-widest text-violet-400 uppercase mt-2">Hora de
              Focar</div>
          </div>
        </div>

        <!-- Controles (Play, Pause, Reset) -->
        <div class="flex items-center space-x-6">
          <!-- Reset -->
          <button id="timer-reset"
            class="w-12 h-12 rounded-full flex items-center justify-center glass-button text-slate-400 hover:text-white"
            title="Reiniciar">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17" />
            </svg>
          </button>

          <!-- Play / Pause -->
          <button id="timer-toggle"
            class="w-20 h-20 rounded-full flex items-center justify-center bg-white text-slate-950 hover:bg-slate-100 hover:scale-105 active:scale-95 shadow-xl shadow-white/10 neon-glow-violet transition-all duration-300">
            <svg id="play-icon" class="w-8 h-8 translate-x-0.5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg id="pause-icon" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
          </button>

          <!-- Pular Sessão -->
          <button id="timer-skip"
            class="w-12 h-12 rounded-full flex items-center justify-center glass-button text-slate-400 hover:text-white"
            title="Pular">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
            </svg>
          </button>
        </div>

        <!-- Indicador de Ciclos -->
        <div class="glass-card px-4 py-2.5 rounded-2xl flex items-center space-x-3 text-xs text-slate-400">
          <span class="flex h-2 w-2 relative">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-violet-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-violet-500"></span>
          </span>
          <span class="font-medium">Sessão: <span id="session-count" class="text-white font-bold">#1</span></span>
        </div>

      </section>

      <!-- ABA 2: RASTREADOR DE HÁBITOS -->
      <section id="habits-view" class="w-1/2 flex-shrink-0 flex flex-col justify-center space-y-5 px-6 py-4">

        <!-- Título & Resumo -->
        <div class="flex items-end justify-between">
          <div>
            <h2 class="text-2xl font-bold tracking-tight text-white">Hábitos de Hoje</h2>
            <p id="current-date" class="text-xs text-slate-400 mt-0.5">Quarta-feira, 24 de Junho</p>
          </div>
          <div class="text-right">
            <span class="text-xs font-bold text-violet-400 tracking-wider uppercase">Progresso</span>
            <div class="text-lg font-extrabold text-white"><span id="habits-completed">0</span>/<span
                id="habits-total">0</span></div>
          </div>
        </div>

        <!-- Barra de Progresso Geral -->
        <div class="w-full h-2 bg-white/[0.03] border border-white/5 rounded-full overflow-hidden">
          <div id="habits-progress-bar"
            class="h-full bg-gradient-to-r from-violet-500 to-fuchsia-500 rounded-full transition-all duration-500"
            style="width: 0%"></div>
        </div>

        <!-- Input para Adicionar Novo Hábito -->
        <form id="add-habit-form" class="flex gap-2">
          <input type="text" id="new-habit-input" placeholder="Novo hábito (ex: Beber água)..." required
            class="flex-1 px-4 py-3 rounded-xl bg-white/[0.02] border border-white/5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-violet-500/50 focus:ring-1 focus:ring-violet-500/20 focus:bg-white/[0.04] transition-all">
          <button type="submit"
            class="p-3.5 rounded-xl bg-white hover:bg-slate-100 text-slate-950 font-semibold shadow-md active:scale-95 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
          </button>
        </form>

        <!-- Lista de Hábitos -->
        <div class="flex-1 min-h-[220px] max-h-[340px] overflow-y-auto pr-1">
          <ul id="habits-list" class="space-y-2.5">
            <!-- Hábitos inseridos dinamicamente pelo JS -->
          </ul>
          <div id="habits-empty-state" class="flex flex-col items-center justify-center text-center py-10 space-y-3">
            <div
              class="w-12 h-12 rounded-xl bg-white/[0.02] border border-white/5 flex items-center justify-center text-slate-500">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
              </svg>
            </div>
            <div>
              <p class="text-sm font-semibold text-slate-400">Nenhum hábito cadastrado</p>
              <p class="text-xs text-slate-500 mt-1">Crie seus hábitos acima para começar a rastrear.</p>
            </div>
          </div>
        </div>

      </section>

    </div>
  </main>

  <!-- Barra de Navegação Inferior (Bottom Navigation) -->
  <nav
    class="relative z-10 glass-nav safe-padding-bottom border-t border-white/5 flex justify-around items-center px-4 py-3 bg-slate-950/60 backdrop-blur-lg">
    <!-- Botão Pomodoro -->
    <button id="nav-pomodoro"
      class="flex flex-col items-center space-y-1 py-1 px-5 rounded-2xl bg-white/[0.04] text-violet-400 transition-all duration-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="text-[10px] font-bold tracking-wider uppercase">Foco</span>
    </button>

    <!-- Botão Hábitos -->
    <button id="nav-habits"
      class="flex flex-col items-center space-y-1 py-1 px-5 rounded-2xl text-slate-400 hover:text-slate-200 transition-all duration-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
      </svg>
      <span class="text-[10px] font-bold tracking-wider uppercase">Hábitos</span>
    </button>
  </nav>

  <!-- Script Principal -->
  <script type="module" src="main.js"></script>
</body>

</html>
