<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta name="theme-color" content="#61f392">
    <!-- iOS: Habilita modo standalone (tela cheia) ao adicionar à tela de início -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fronteira+">
    <!-- Android Chrome: modo tela cheia -->
    <meta name="mobile-web-app-capable" content="yes">


    <title>PWA Simples</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <script>
        function inicializarPWA() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado:', reg.scope))
                    .catch(err => console.error('Erro no SW:', err));
            }
        }

        // Executa a inicialização do ecossistema SPA
        inicializarPWA();
    </script>
</body>

</html>
