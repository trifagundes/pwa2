<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PWA Simples</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body style="margin: 0; padding: 0; background-color: #ff6600; width: 100vw; height: 100dvh; overflow: hidden;">

    <script>
        // Função inicializadora isolada para o ecossistema do SPA
        function inicializarPWA() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado com sucesso:', reg.scope))
                    .catch(err => console.error('Falha ao registrar o Service Worker:', err));
            }
        }

        // A função fica disponível para ser chamada pelo fluxo principal do seu SPA
        window.inicializarPWA = inicializarPWA;
    </script>
</body>
</html>
